<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prode Mundial 2026</title>
  <style>
    :root {
      --bg: #050814;
      --surface: #0d1424;
      --card: #121d31;
      --card-hi: #17243b;
      --border: #283954;
      --text: #eef5ff;
      --text-muted: #9aa8bf;
      --primary: #4ea8ff;
      --accent: #ff4d6d;
      --gold: #ffd166;
      --silver: #c7d2de;
      --bronze: #f59e66;
      --green: #21c981;
      --yellow: #f8c846;
      --orange: #ff9f1c;
      --red-dim: #6f1d2a;
      --cyan: #29e7ff;
      --teal: #35d0a8;
      --blue-soft: #7bb7ff;
      --gray: #66758f;
      --field: #1fbf75;
      --field-dark: #0f7049;
      --shadow: 0 22px 70px rgba(0, 0, 0, .42);
      --radius: 18px;
      --radius-sm: 12px;
      --header-h: 76px;
      --nav-h: 66px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 12% -10%, rgba(78, 168, 255, .28), transparent 34rem),
        radial-gradient(circle at 86% 0%, rgba(255, 77, 109, .20), transparent 30rem),
        radial-gradient(circle at 50% 115%, rgba(31, 191, 117, .15), transparent 34rem),
        linear-gradient(180deg, #040712 0%, var(--bg) 55%, #03050d 100%);
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-variant-numeric: tabular-nums;
      overflow-x: hidden;
    }

    button, input, select { font: inherit; }

    button { cursor: pointer; }

    button:disabled { opacity: .62; cursor: not-allowed; }

    .app-shell { min-height: 100vh; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      min-height: var(--header-h);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 16px clamp(16px, 4vw, 38px);
      border-bottom: 1px solid rgba(42, 53, 80, .72);
      background: rgba(10, 14, 26, .82);
      backdrop-filter: blur(16px);
    }

    .brand { display: flex; gap: 14px; align-items: center; min-width: 0; }

    .brand-mark {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: conic-gradient(from 210deg, var(--accent), var(--gold), var(--field), var(--primary), var(--accent));
      box-shadow: 0 14px 34px rgba(78, 168, 255, .25), inset 0 0 0 2px rgba(255,255,255,.08);
      font-size: 1.45rem;
      flex: 0 0 auto;
    }

    .brand h1 { margin: 0; font-size: clamp(1.2rem, 2.7vw, 1.9rem); letter-spacing: -.03em; }
    .brand small { color: var(--text-muted); display: block; margin-top: 2px; }

    .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: end; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 12px;
      border: 1px solid rgba(42, 53, 80, .84);
      border-radius: 999px;
      color: var(--text-muted);
      background: rgba(13, 20, 36, .82);
      white-space: nowrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      padding: 10px 14px;
      border: 1px solid rgba(78, 168, 255, .42);
      border-radius: 999px;
      color: var(--text);
      background: linear-gradient(180deg, rgba(78, 168, 255, .28), rgba(78, 168, 255, .14));
      box-shadow: inset 0 1px rgba(255, 255, 255, .05);
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }

    .btn:hover { transform: translateY(-1px); border-color: rgba(78, 168, 255, .75); }
    .btn.ghost { background: rgba(28, 37, 55, .65); border-color: rgba(42, 53, 80, .9); }
    .btn.danger { border-color: rgba(255, 77, 109, .42); background: rgba(255, 77, 109, .15); }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(232, 237, 245, .26);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    .spinner.hidden { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tabbar {
      position: sticky;
      top: var(--header-h);
      z-index: 24;
      display: flex;
      gap: 10px;
      padding: 12px clamp(16px, 4vw, 38px);
      background: rgba(10, 14, 26, .66);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(42, 53, 80, .58);
      overflow-x: auto;
    }

    .tab-btn {
      flex: 0 0 auto;
      border: 1px solid rgba(42, 53, 80, .86);
      background: rgba(19, 25, 41, .72);
      color: var(--text-muted);
      border-radius: 999px;
      padding: 12px 16px;
      transition: .2s ease;
    }

    .tab-btn.active {
      color: white;
      border-color: rgba(78, 168, 255, .8);
      background: linear-gradient(135deg, rgba(78, 168, 255, .82), rgba(31, 191, 117, .50), rgba(255, 77, 109, .45));
      box-shadow: 0 10px 28px rgba(78, 168, 255, .18);
    }

    main {
      width: min(1440px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 58px;
    }

    .tab-panel { animation: panelIn .24s ease both; }
    @keyframes panelIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .grid { display: grid; gap: 16px; }
    .grid.two { grid-template-columns: minmax(0, 1.2fr) minmax(280px, .8fr); align-items: start; }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .card {
      background: linear-gradient(180deg, rgba(28, 37, 55, .95), rgba(19, 25, 41, .96));
      border: 1px solid rgba(42, 53, 80, .9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card.pad { padding: 18px; }
    .section-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .section-title h2, .section-title h3 { margin: 0; letter-spacing: -.02em; }
    .section-title p { margin: 4px 0 0; color: var(--text-muted); }

    .stat-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; margin-bottom: 16px; }
    .stat {
      padding: 14px;
      border: 1px solid rgba(42, 53, 80, .78);
      background: rgba(19, 25, 41, .72);
      border-radius: 16px;
    }
    .stat strong { display: block; font-size: 1.45rem; }
    .stat span { color: var(--text-muted); font-size: .88rem; }

    .leaderboard { display: grid; gap: 10px; }
    .leader-row {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr) auto minmax(120px, 220px);
      gap: 14px;
      align-items: center;
      padding: 14px;
      border: 1px solid rgba(42, 53, 80, .75);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(18, 29, 49, .76), rgba(13, 20, 36, .66));
      color: var(--text);
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }
    .leader-row:hover { transform: translateX(2px); border-color: rgba(78, 168, 255, .55); background: linear-gradient(180deg, rgba(23, 36, 59, .94), rgba(14, 23, 40, .92)); }
    .rank { font-size: 1.18rem; font-weight: 900; color: var(--text); text-align: center; }
    .rank.r1 { color: var(--gold); } .rank.r2 { color: var(--silver); } .rank.r3 { color: var(--bronze); }
    .player-name { color: #f8fbff; font-weight: 850; letter-spacing: -.01em; min-width: 0; overflow: hidden; text-overflow: ellipsis; text-shadow: 0 1px 0 rgba(0,0,0,.35); }
    .points { font-size: 1.35rem; font-weight: 950; color: white; }
    .mini-note { color: var(--text-muted); font-size: .82rem; margin-top: 3px; }
    .leader-main { min-width: 0; }
    .rule-summary { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
    .rule-count-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 7px;
      border-radius: 999px;
      color: rgba(248,251,255,.92);
      border: 1px solid rgba(255,255,255,.09);
      background: rgba(10,14,26,.34);
      font-size: .72rem;
      line-height: 1;
      white-space: nowrap;
    }
    .rule-count-chip strong { color: white; font-weight: 950; }
    .leader-extra-note { margin-top: 6px; }

    .breakbar { height: 13px; border-radius: 999px; display: flex; overflow: hidden; background: rgba(100,116,139,.22); box-shadow: inset 0 0 0 1px rgba(255,255,255,.04); }
    .breakbar span { min-width: 2px; }

    .tier-10 { background: var(--green); }
    .tier-8 { background: var(--cyan); }
    .tier-7 { background: var(--teal); }
    .tier-6 { background: var(--blue-soft); }
    .tier-5 { background: var(--yellow); }
    .tier-2 { background: var(--orange); }
    .tier-1 { background: #ef4444; }
    .tier-0 { background: var(--gray); }

    .score-pill, .status, .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 6px 9px;
      border: 1px solid rgba(42,53,80,.8);
      background: rgba(10,14,26,.42);
      white-space: nowrap;
    }

    .score-pill { min-width: 56px; color: white; font-weight: 950; font-size: 1.03rem; }
    .status { font-size: .76rem; font-weight: 900; letter-spacing: .04em; }
    .status.pre { color: var(--text-muted); }
    .status.live { color: white; border-color: rgba(255, 77, 109, .62); background: rgba(255, 77, 109, .18); box-shadow: 0 0 18px rgba(255, 77, 109, .14); gap: 6px; }
    .status.live::before { content: ''; width: 7px; height: 7px; border-radius: 999px; background: #ff4d6d; box-shadow: 0 0 0 0 rgba(255,77,109,.72); animation: livePulse 1.25s infinite; }
    @keyframes livePulse { 0% { box-shadow: 0 0 0 0 rgba(255,77,109,.72); } 70% { box-shadow: 0 0 0 7px rgba(255,77,109,0); } 100% { box-shadow: 0 0 0 0 rgba(255,77,109,0); } }
    .status.final { color: #b8ffd0; border-color: rgba(34, 197, 94, .5); background: rgba(34, 197, 94, .13); }

    .prize-card { margin-top: 16px; }
    .money-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; align-items: end; }
    label { display: grid; gap: 7px; color: var(--text-muted); font-size: .87rem; }
    input, select {
      width: 100%;
      color: var(--text);
      background: rgba(10, 14, 26, .72);
      border: 1px solid rgba(42, 53, 80, .9);
      border-radius: 12px;
      padding: 11px 12px;
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease;
    }
    input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(78,168,255,.12); }
    input[type="number"] { appearance: textfield; }
    input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { appearance: none; margin: 0; }

    .money-box {
      padding: 12px;
      border: 1px solid rgba(42,53,80,.72);
      background: rgba(19,25,41,.62);
      border-radius: 14px;
    }
    .money-box span { color: var(--text-muted); font-size: .82rem; }
    .money-box strong { display: block; font-size: 1.3rem; margin-top: 4px; }

    .match-card { border: 1px solid rgba(42,53,80,.82); background: linear-gradient(180deg, rgba(18,29,49,.86), rgba(12,19,34,.80)); border-radius: 18px; overflow: hidden; }
    .match-card.live-match { border-color: rgba(255,77,109,.72); box-shadow: 0 0 0 1px rgba(255,77,109,.18), 0 14px 40px rgba(255,77,109,.10); }
    .match-card.live-match .score-pill { border-color: rgba(255,77,109,.72); background: rgba(255,77,109,.16); }
    .match-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 12px;
      padding: 14px;
    }
    .team { font-weight: 900; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
    .team.right { text-align: right; }
    .match-meta { color: var(--text-muted); font-size: .84rem; margin-top: 3px; }

    .pred-table { width: 100%; border-collapse: collapse; }
    .pred-table th, .pred-table td { padding: 10px 12px; border-top: 1px solid rgba(42,53,80,.58); text-align: left; }
    .pred-table th { color: var(--text-muted); font-size: .78rem; text-transform: uppercase; letter-spacing: .07em; background: rgba(10,14,26,.26); }
    .pred-table td:last-child, .pred-table th:last-child { text-align: right; }
    .pred-table tr:hover td { background: rgba(78,168,255,.06); }
    .pred-table td:first-child { color: #f8fbff; font-weight: 800; }

    .point-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      padding: 5px 8px;
      border-radius: 999px;
      color: #061018;
      font-weight: 950;
    }
    .point-chip.p0 { color: var(--text-muted); background: rgba(100,116,139,.22); }
    .point-chip.p1 { color: white; background: #dc2626; }
    .point-chip.p2 { color: #111827; background: var(--orange); }
    .point-chip.p5 { color: #111827; background: var(--yellow); }
    .point-chip.p6 { color: #081426; background: var(--blue-soft); }
    .point-chip.p7 { color: #04201c; background: var(--teal); }
    .point-chip.p8 { color: #041720; background: var(--cyan); }
    .point-chip.p10 { color: #04140a; background: var(--green); }
    .missing-prode { color: var(--text-muted); font-style: italic; font-size: .84rem; }

    .filterbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
    .filterbar select { width: auto; min-width: 150px; }
    .filter-btn { border: 1px solid rgba(42,53,80,.86); background: rgba(19,25,41,.75); color: var(--text-muted); border-radius: 999px; padding: 10px 13px; }
    .filter-btn.active { color: white; border-color: rgba(78,168,255,.72); background: rgba(78,168,255,.24); }

    .group-block { margin-bottom: 14px; border: 1px solid rgba(42,53,80,.82); border-radius: 18px; overflow: hidden; background: linear-gradient(180deg, rgba(18,29,49,.72), rgba(8,13,24,.66)); }
    .group-header { width: 100%; border: 0; color: var(--text); background: linear-gradient(90deg, rgba(78,168,255,.22), rgba(31,191,117,.12), rgba(255,77,109,.10)); padding: 15px 16px; text-align: left; display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .group-header strong { letter-spacing: .08em; }
    .group-header span { color: var(--text-muted); font-size: .9rem; }
    .group-content { display: grid; gap: 10px; padding: 12px; }
    .chev { transition: transform .2s ease; }
    .collapsed .chev { transform: rotate(-90deg); }
    .collapsed .group-content { display: none; }
    .match-toggle { width: 100%; border: 0; color: var(--text); background: transparent; text-align: left; }
    .match-expanded { border-top: 1px solid rgba(42,53,80,.64); }

    .empty {
      padding: 38px 20px;
      text-align: center;
      border: 1px dashed rgba(139,150,176,.32);
      border-radius: var(--radius);
      background: rgba(19,25,41,.45);
    }
    .empty strong { display: block; font-size: 1.2rem; margin-bottom: 7px; }
    .empty p { color: var(--text-muted); margin: 0; }

    .sim-layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(330px, 440px); gap: 16px; align-items: start; }
    .sim-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
    .sim-card { padding: 14px; border: 1px solid rgba(42,53,80,.75); border-radius: 16px; background: rgba(19,25,41,.66); }
    .sim-teams { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; margin-bottom: 12px; }
    .sim-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .sim-inputs input { text-align: center; font-size: 1.1rem; font-weight: 950; }
    .sticky-side { position: sticky; top: calc(var(--header-h) + 74px); max-height: calc(100vh - 110px); overflow: auto; }
    .sim-rank-row {
      display: grid;
      grid-template-columns: 50px minmax(0,1fr) 74px 74px 56px;
      gap: 8px;
      align-items: center;
      padding: 10px 8px;
      border-top: 1px solid rgba(42,53,80,.52);
      font-size: .94rem;
    }
    .sim-rank-row.header { color: var(--text-muted); font-size: .72rem; letter-spacing: .05em; text-transform: uppercase; border-top: 0; }
    .delta.up { color: var(--green); font-weight: 950; }
    .delta.down { color: var(--accent); font-weight: 950; }
    .delta.same { color: var(--text-muted); font-weight: 950; }

    .drawer-overlay {
      position: fixed;
      inset: 0;
      z-index: 70;
      background: rgba(0,0,0,.55);
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease;
    }
    .drawer-overlay.show { opacity: 1; pointer-events: auto; }
    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 80;
      width: min(560px, 100vw);
      height: 100vh;
      background: #0a1020;
      border-left: 1px solid rgba(42,53,80,.95);
      box-shadow: -24px 0 70px rgba(0,0,0,.5);
      transform: translateX(105%);
      transition: transform .25s ease;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .drawer.show { transform: translateX(0); }
    .drawer-head { display: flex; justify-content: space-between; align-items: start; gap: 12px; padding: 18px; border-bottom: 1px solid rgba(42,53,80,.76); }
    .drawer-head h2 { margin: 0; }
    .drawer-body { overflow: auto; padding: 16px; }
    .detail-group { margin-bottom: 16px; }
    .detail-group h3 { margin: 0 0 8px; color: var(--text-muted); font-size: .82rem; letter-spacing: .08em; text-transform: uppercase; }
    .detail-row { display: grid; grid-template-columns: minmax(0, 1fr) 70px 70px 62px; gap: 8px; align-items: center; padding: 9px 0; border-top: 1px solid rgba(42,53,80,.48); }
    .detail-row:first-of-type { border-top: 0; }
    .detail-row small { color: var(--text-muted); display: block; margin-top: 2px; }
    .drawer-total { position: sticky; bottom: 0; background: linear-gradient(180deg, rgba(10,16,32,.88), #0a1020); padding-top: 12px; }

    .toast-stack { position: fixed; right: 16px; bottom: 18px; z-index: 100; display: grid; gap: 10px; }
    .toast {
      max-width: 360px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(42,53,80,.9);
      background: rgba(19,25,41,.96);
      box-shadow: var(--shadow);
      animation: toastIn .24s ease both;
    }
    @keyframes toastIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform:none; } }

    .table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .curio-title { align-items: flex-start; }
    .curio-actions { display: flex; gap: 10px; align-items: end; flex-wrap: wrap; justify-content: end; }
    .compact-label { min-width: 190px; }
    .curio-highlight-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; margin: 14px 0 16px; }
    .curio-highlight { padding: 14px; border: 1px solid rgba(42,53,80,.78); background: rgba(19,25,41,.68); border-radius: 16px; }
    .curio-highlight span { display: block; color: var(--text-muted); font-size: .86rem; margin-bottom: 6px; }
    .curio-highlight strong { display: block; color: white; line-height: 1.25; }
    .curio-highlight p { margin: 8px 0 0; color: var(--text-muted); font-size: .9rem; }
    .curio-match-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 12px; }
    .curio-match-card { border: 1px solid rgba(42,53,80,.78); border-radius: 16px; padding: 14px; background: linear-gradient(180deg, rgba(18,29,49,.74), rgba(10,14,26,.62)); }
    .curio-match-head { display: flex; justify-content: space-between; gap: 12px; align-items: start; margin-bottom: 12px; }
    .curio-match-head strong { display: block; color: #fff; }
    .curio-match-head span { display: block; color: var(--text-muted); font-size: .84rem; margin-top: 3px; }
    .outcome-bars { display: grid; gap: 8px; }
    .outcome-bar-label { display: flex; justify-content: space-between; gap: 10px; color: var(--text-muted); font-size: .86rem; margin-bottom: 4px; }
    .outcome-bar-label strong { color: white; }
    .bar-track { height: 9px; border-radius: 999px; overflow: hidden; background: rgba(100,116,139,.22); }
    .bar-track span { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--primary), var(--green)); min-width: 2px; }
    .score-cloud { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 12px; }
    .score-cloud span { border: 1px solid rgba(42,53,80,.78); background: rgba(10,14,26,.46); border-radius: 999px; padding: 6px 9px; color: var(--text-muted); }
    .score-cloud strong { color: #fff; margin-left: 4px; }
    .daily-ranking { display: grid; gap: 8px; }
    .daily-row { display: grid; grid-template-columns: 44px minmax(0,1fr) auto auto; gap: 10px; align-items: center; padding: 10px 12px; border: 1px solid rgba(42,53,80,.62); border-radius: 14px; background: rgba(19,25,41,.58); }

    @media (max-width: 980px) {
      .grid.two, .sim-layout { grid-template-columns: 1fr; }
      .sticky-side { position: static; max-height: none; }
      .stat-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .money-row { grid-template-columns: 1fr; }
      .leader-row { grid-template-columns: 42px minmax(0, 1fr) auto; }
      .leader-row .breakbar { grid-column: 2 / -1; }
    }

        top: auto;
        bottom: 0;
        left: 0;
        right: 0;

        border-bottom: 0;

      main { width: min(100% - 18px, 1440px); padding-top: 14px; }
      .card.pad { padding: 13px; border-radius: 16px; }
      .section-title { align-items: flex-start; flex-direction: column; }
      .section-title .pill { align-self: flex-start; }
      .header-actions, .curio-actions { width: 100%; justify-content: stretch; }
      .header-actions .pill, .header-actions .btn, .curio-actions .btn, .curio-actions label { flex: 1 1 100%; }
      .brand-mark { width: 42px; height: 42px; }
      .pill, .btn { min-height: 38px; padding: 8px 10px; font-size: .88rem; }
      .stat-grid, .curio-highlight-grid { grid-template-columns: 1fr 1fr; gap: 9px; }
      .stat { padding: 11px; }
      .stat strong { font-size: 1.22rem; }
      .leader-row { grid-template-columns: 34px minmax(0, 1fr) auto; padding: 11px; gap: 9px; }
      .rule-summary { gap: 4px; margin-top: 6px; }
      .rule-count-chip { padding: 4px 6px; font-size: .68rem; }
      .points { font-size: 1.12rem; }
      .filterbar select, .filterbar .filter-btn { flex: 1 1 calc(50% - 8px); min-width: 0; }
      .match-head { grid-template-columns: minmax(0,1fr) auto minmax(0,1fr); gap: 8px; padding: 12px; }
      .team { white-space: normal; overflow: visible; text-overflow: clip; line-height: 1.18; }
      .match-head .count-badge, .match-head .status { grid-column: 1 / -1; justify-self: center; max-width: 100%; white-space: normal; text-align: center; }

      .pred-table, .pred-table tbody, .pred-table tr, .pred-table td { display: block; width: 100%; }
      .pred-table thead { display: none; }
      .pred-table tr { padding: 10px 0; border-top: 1px solid rgba(42,53,80,.58); }
      .pred-table tr:first-child { border-top: 0; }
      .pred-table td { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 7px 4px; border-top: 0; text-align: right; }
      .pred-table td::before { content: attr(data-label); color: var(--text-muted); font-size: .74rem; text-transform: uppercase; letter-spacing: .05em; text-align: left; }
      .pred-table td:first-child { font-size: 1rem; }
      .pred-table td:first-child::before { content: ''; display: none; }
      .pred-table td:first-child { justify-content: flex-start; text-align: left; padding-top: 3px; }
      .sim-grid, .curio-match-grid { grid-template-columns: 1fr; }
      .sim-rank-row { grid-template-columns: 58px minmax(0,1fr) 54px 54px 42px; font-size: .82rem; gap: 5px; }
      .curio-match-head { align-items: center; }
      .daily-row { grid-template-columns: 36px minmax(0,1fr) auto; }
      .daily-row strong { grid-column: 3; }
      .daily-row span:nth-child(3) { grid-column: 2 / -1; color: var(--text-muted); font-size: .82rem; }
      .detail-row { grid-template-columns: 1fr 52px 52px 50px; }
    }


    @media (max-width: 430px) {
      :root { --nav-h: 74px; }
      .tabbar { gap: 4px; padding-left: 5px; padding-right: 5px; }
      .tab-btn { font-size: .68rem; line-height: 1.05; padding: 8px 2px; }
      .stat-grid, .curio-highlight-grid { grid-template-columns: 1fr; }
      .match-meta, .mini-note { font-size: .78rem; }
      .rule-count-chip { font-size: .64rem; padding: 4px 5px; }
      .rule-count-chip strong { font-size: .72rem; }
      .group-header { padding: 12px; }
      .group-header span { font-size: .78rem; }
      .score-cloud span { font-size: .84rem; }
    }

        const cached = JSON.parse(localStorage.getItem(RESULT_CACHE_KEY) || 'null');
        if (cached && cached.results) {
          APP_STATE.results = cached.results;
          APP_STATE.lastFetch = cached.timestamp || null;
          updateLastFetchLabel();
        }
      } catch (error) {
        console.warn('No se pudo leer el caché del prode', error);
      }
    }

    function persistResults() {
      localStorage.setItem(RESULT_CACHE_KEY, JSON.stringify({ timestamp: APP_STATE.lastFetch, results: APP_STATE.results }));
      updateLastFetchLabel();
    }

    function updateLastFetchLabel() {
      const label = $('#lastUpdated');
      if (!APP_STATE.lastFetch) { label.textContent = 'Sin actualizar'; return; }
      label.textContent = 'Actualizado ' + relativeTime(APP_STATE.lastFetch);
    }

    function relativeTime(timestamp) {
      const diff = Math.max(0, Date.now() - Number(timestamp));
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'recién';
      if (mins === 1) return 'hace 1 min';
      if (mins < 60) return 'hace ' + mins + ' min';
      const hours = Math.floor(mins / 60);
      if (hours === 1) return 'hace 1 h';
      if (hours < 24) return 'hace ' + hours + ' h';
      const days = Math.floor(hours / 24);
      return days === 1 ? 'hace 1 día' : 'hace ' + days + ' días';
    }

    function setLoading(isLoading, text = 'Listo') {
      APP_STATE.loading = isLoading;
      $('#fetchSpinner').classList.toggle('hidden', !isLoading);
      $('#fetchStatus').textContent = text;
      $('#refreshBtn').disabled = isLoading;
    }

    async function fetchAllGroupStageResults(force = false) {
      const cachedFresh = APP_STATE.lastFetch && Date.now() - APP_STATE.lastFetch < CACHE_MAX_AGE;
      if (!force && cachedFresh) return;
      if (force) localStorage.removeItem(RESULT_CACHE_KEY);
      setLoading(true, 'Buscando resultados');
      const nextResults = { ...APP_STATE.results };
      let matchedEvents = 0;
      try {
        for (const dateStr of GROUP_DATES) {
          const data = await fetchResultsForDate(dateStr);
          const events = Array.isArray(data.events) ? data.events : [];
          for (const event of events) {
            const mapped = matchEventToLocalMatch(event);
            if (!mapped) continue;
            nextResults[mapped.matchIndex] = mapped.result;
            matchedEvents += 1;
          }
          await sleep(300);
        }
        APP_STATE.results = nextResults;
        APP_STATE.lastFetch = Date.now();
        persistResults();
        showToast(matchedEvents ? 'Resultados actualizados ✓' : 'Fixture confirmado cargado; ESPN todavía no devolvió resultados para estos partidos');
        render();
      } catch (error) {
        console.warn('Error al obtener resultados', error);
        showToast('Error al obtener resultados – usando caché');
      } finally {
        setLoading(false, 'Listo');
      }
    }

    async function fetchResultsForDate(dateStr) {
      const response = await fetch(API_URL + dateStr, { cache: 'no-store' });
      if (!response.ok) throw new Error('ESPN respondió ' + response.status);
      return response.json();
    }

    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    function makeDateRange(fromIso, toIso) {
      const dates = [];
      const date = new Date(fromIso + 'T12:00:00Z');
      const end = new Date(toIso + 'T12:00:00Z');
      while (date <= end) {
        dates.push(date.toISOString().slice(0, 10).replaceAll('-', ''));
        date.setUTCDate(date.getUTCDate() + 1);
      }
      return dates;
    }

    function matchEventToLocalMatch(event) {
      const competition = event.competitions && event.competitions[0];
      if (!competition || !Array.isArray(competition.competitors)) return null;
      const competitors = competition.competitors;
      const home = competitors.find(c => c.homeAway === 'home') || competitors[0];
      const away = competitors.find(c => c.homeAway === 'away') || competitors[1];
      if (!home || !away) return null;
      const homeNames = getEspnTeamNames(home);
      const awayNames = getEspnTeamNames(away);
      const homeScore = parseScore(home.score);
      const awayScore = parseScore(away.score);
      const status = competition.status || {};
      const statusType = status.type || {};
      const normalizedState = normalizeMatchState(statusType, status);
      for (let i = 0; i < PRODE_DATA.matches.length; i += 1) {
        const match = PRODE_DATA.matches[i];
        const local1 = toEspnName(match.team1);
        const local2 = toEspnName(match.team2);
        const normal = sameTeamAny(homeNames, local1) && sameTeamAny(awayNames, local2);
        const reversed = sameTeamAny(homeNames, local2) && sameTeamAny(awayNames, local1);
        if (!normal && !reversed) continue;
        const hasScore = Number.isFinite(homeScore) && Number.isFinite(awayScore) && normalizedState !== 'pre';
        const score = hasScore ? (normal ? [homeScore, awayScore] : [awayScore, homeScore]) : null;
        return {
          matchIndex: i,
          result: {
            score,
            date: event.date || null,
            state: normalizedState,
            completed: Boolean(statusType.completed) || normalizedState === 'post',
            description: statusType.description || statusType.shortDetail || statusType.detail || '',
            displayClock: status.displayClock || statusType.shortDetail || '',
            period: status.period || null,
            sourceId: event.id || null,
            fetchedAt: Date.now()
          }
        };
      }
      return null;
    }

    function normalizeMatchState(statusType = {}, status = {}) {
      const state = String(statusType.state || '').toLowerCase();
      if (state === 'post' || statusType.completed) return 'post';
      if (state === 'in') return 'in';
      if (state === 'pre') return 'pre';

      const text = [
        statusType.name,
        statusType.description,
        statusType.shortDetail,
        statusType.detail,
        status.displayClock
      ].filter(Boolean).join(' ').toUpperCase();

      if (/\b(FINAL|FT|FULL\s*TIME|COMPLETED|STATUS_FINAL)\b/.test(text)) return 'post';
      if (/(IN_PROGRESS|STATUS_IN_PROGRESS|LIVE|EN VIVO|HALFTIME|HALF\s*TIME|1ST|2ND|FIRST HALF|SECOND HALF|EXTRA TIME|PENALTY|INTERMISSION)/.test(text)) return 'in';
      return 'pre';
    }

    function getEspnTeamNames(competitor) {
      const team = competitor?.team || {};
      return [
        team.displayName,
        team.shortDisplayName,
        team.name,
        team.abbreviation,
        team.location
      ].filter(Boolean);
    }

    function parseScore(score) {
      const n = Number(score);
      return Number.isFinite(n) ? n : null;
    }

    function toEspnName(localName) { return TEAM_MAP[localName] || localName; }

    function normalizeBasicName(name) {
      return String(name || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/&/g, 'and')
        .replace(/[^a-zA-Z0-9]+/g, ' ')
        .replace(/\b(and|y|e|the|of|de|del)\b/gi, ' ')
        .trim()
        .replace(/\s+/g, ' ')
        .toLowerCase();
    }

    function getTeamAliasLookup() {
      if (!TEAM_ALIAS_LOOKUP) {
        TEAM_ALIAS_LOOKUP = Object.entries(TEAM_ALIASES).reduce((lookup, [alias, canonical]) => {
          const key = normalizeBasicName(alias);
          const value = normalizeBasicName(canonical);
          if (key && value) lookup[key] = value;
          return lookup;
        }, {});
      }
      return TEAM_ALIAS_LOOKUP;
    }

    function normalizeName(name) {
      const basic = normalizeBasicName(name);
      return getTeamAliasLookup()[basic] || basic;
    }

    function sameTeamAny(names, target) {
      const list = Array.isArray(names) ? names : [names];
      return list.some(name => sameTeam(name, target));
    }

    function sameTeam(a, b) {
      const x = normalizeName(a);
      const y = normalizeName(b);
      if (!x || !y) return false;
      if (x === y) return true;
      return x.length > 3 && y.length > 3 && (x.includes(y) || y.includes(x));
    }

    function calculatePoints(pred, actual) {
      if (!Array.isArray(pred) || !Array.isArray(actual)) return 0;
      const [ph, pa] = pred.map(Number);
      const [ah, aa] = actual.map(Number);
      if (![ph, pa, ah, aa].every(Number.isFinite)) return 0;
      const predDiff = ph - pa;
      const actualDiff = ah - aa;
      const predSign = Math.sign(predDiff);
      const actualSign = Math.sign(actualDiff);
      if (ph === ah && pa === aa) return 10;
      if (predSign !== 0 && predSign === actualSign && predDiff === actualDiff) return 8;
      if (predSign !== 0 && predSign === actualSign && (ph === ah || pa === aa)) return 7;
      if (predSign === 0 && actualSign === 0) return 6;
      if (predSign !== 0 && predSign === actualSign) return 5;
      if (ph === ah || pa === aa) return 2;
      if (ph === aa && pa === ah) return 1;
      return 0;
    }

    window.calculatePoints = calculatePoints;

    function computeLeaderboard(resultSet, options = {}) {
      const useSimulationDefaults = Boolean(options.useSimulationDefaults);
      const rows = PRODE_DATA.participants.map(name => {
        const breakdown = Object.fromEntries(SCORE_TIERS.map(t => [t, 0]));
        let pending = 0;
        let noPrediction = 0;
        const matchPoints = PRODE_DATA.matches.map((match, index) => {
          const actual = useSimulationDefaults ? getSimulatedScore(index, resultSet) : getResultScore(index, resultSet);
          const pred = match.predictions[name];
          if (!Array.isArray(actual)) {
            pending += 1;
            return 0;
          }
          if (!Array.isArray(pred)) {
            noPrediction += 1;
            return 0;
          }
          const points = calculatePoints(pred, actual);
          breakdown[points] = (breakdown[points] || 0) + 1;
          return points;
        });
        const total = matchPoints.reduce((sum, pts) => sum + pts, 0);
        return { name, total, breakdown, matchPoints, pending, noPrediction };
      }).sort((a, b) => b.total - a.total || a.name.localeCompare(b.name, 'es'));
      return assignRanks(rows);
    }

    function assignRanks(rows) {
      let lastTotal = null;
      let lastRank = 0;
      return rows.map((row, index) => {
        const rank = row.total === lastTotal ? lastRank : index + 1;
        lastTotal = row.total;
        lastRank = rank;
        return { ...row, rank };
      });
    }

    function getFixtureEntry(index) {
      const fixture = FIXTURE_SCHEDULE[index];
      if (!fixture) return null;
      return {
        score: null,
        date: fixture.date,
        venue: fixture.venue,
        state: 'pre',
        completed: false,
        description: 'Fixture confirmado',
        displayClock: '',
        period: null,
        sourceId: 'fixture-' + index,
        source: 'fixture'
      };
    }

    function getResultEntry(index, resultSet = APP_STATE.results) {
      const live = resultSet[String(index)] || resultSet[index] || null;
      const fixture = getFixtureEntry(index);
      if (!live) return fixture;
      return {
        ...fixture,
        ...live,
        date: live.date || fixture?.date || null,
        venue: live.venue || fixture?.venue || null,
        source: live.source || 'espn'
      };
    }
    function getResultScore(index, resultSet = APP_STATE.results) {
      const entry = getResultEntry(index, resultSet);
      return entry && Array.isArray(entry.score) ? entry.score : null;
    }
    function isPlayed(index, resultSet = APP_STATE.results) { return Array.isArray(getResultScore(index, resultSet)); }

    function getSimulatedScore(index, overrides = APP_STATE.simulatedOverrides) {
      const real = getResultScore(index, APP_STATE.results);
      if (real) return real;
      const override = overrides[String(index)];
      const score = override && Array.isArray(override.score) ? override.score.map(Number) : null;
      if (score && score.length === 2 && score.every(Number.isFinite)) return score;
      return null;
    }

    function getSimInputValues(index, overrides = APP_STATE.simulatedOverrides) {
      const real = getResultScore(index, APP_STATE.results);
      if (real) return real;
      const override = overrides[String(index)];
      if (!override || !Array.isArray(override.score)) return ['', ''];
      return [0, 1].map(side => {
        const value = override.score[side];
        if (value === '' || value === null || value === undefined) return '';
        const number = Number(value);
        return Number.isFinite(number) ? number : '';
      });
    }

    function mostCommonPrediction(match) {
      const counter = new Map();
      for (const pred of Object.values(match.predictions)) {
        if (!Array.isArray(pred)) continue;
        const key = pred.join('-');
        counter.set(key, (counter.get(key) || 0) + 1);
      }
      let bestKey = '0-0';
      let bestCount = -1;
      for (const [key, count] of counter) {
        if (count > bestCount) { bestKey = key; bestCount = count; }
      }
      return bestKey.split('-').map(Number);
    }

    function render() {
      updateLastFetchLabel();
      if (APP_STATE.activeTab === 'tabla') renderTabla();
      if (APP_STATE.activeTab === 'hoy') renderHoy();
      if (APP_STATE.activeTab === 'partidos') renderPartidos();
      if (APP_STATE.activeTab === 'datos') renderDatosCuriosos();
      if (APP_STATE.activeTab === 'simulador') renderSimulador();
    }

    function renderTabla() {
      const leaderboard = computeLeaderboard(APP_STATE.results);
      const played = PRODE_DATA.matches.filter((_, i) => isPlayed(i)).length;
      const exactos = leaderboard.reduce((sum, row) => sum + row.breakdown[10], 0);
      const leader = leaderboard[0];
      app.innerHTML = `
        <section class="grid">
          <div class="stat-grid">
            <div class="stat"><strong>${played}/72</strong><span>Partidos con resultado</span></div>
            <div class="stat"><strong>${leader ? leader.total : 0}</strong><span>Puntos del puntero</span></div>
            <div class="stat"><strong>${exactos}</strong><span>Exactos del grupo</span></div>
            <div class="stat"><strong>${PRODE_DATA.participants.length}</strong><span>Amigos jugando</span></div>
          </div>
          <article class="card pad">
            <div class="section-title">
              <div><h2>Tabla general</h2><p>Tocá un nombre para ver partido por partido.</p></div>
              <span class="pill">${played ? 'En carrera' : 'Esperando el arranque'}</span>
            </div>
            <div class="leaderboard">
              ${leaderboard.map(row => renderLeaderRow(row)).join('')}
            </div>
          </article>
          ${renderPrizeCard()}
        </section>
      `;
      $$('.leader-row', app).forEach(row => row.addEventListener('click', () => openParticipantDrawer(row.dataset.name)));
      $('#prizePool')?.addEventListener('input', (event) => {
        const clean = Number(event.target.value || 0);
        APP_STATE.prizePool = clean;
        localStorage.setItem(PRIZE_CACHE_KEY, String(clean));
        renderPrizeNumbers();
      });
    }

    function renderLeaderRow(row) {
      const missing = countMissingPredictions(row.name);
      const rank = row.rank === 1 ? '🥇' : row.rank === 2 ? '🥈' : row.rank === 3 ? '🥉' : row.rank;
      const rankClass = row.rank <= 3 ? 'r' + row.rank : '';
      const pending = Number(row.pending || 0);
      const extraNotes = [
        pending ? `${pending} pendientes` : '',
        row.noPrediction ? `${row.noPrediction} sin prode en partidos jugados` : '',
        missing ? `${missing} pronósticos sin cargar` : ''
      ].filter(Boolean).join(' · ');
      return `
        <button class="leader-row" type="button" data-name="${escapeAttr(row.name)}">
          <div class="rank ${rankClass}">${rank}</div>
          <div class="leader-main">
            <div class="player-name">${escapeHtml(row.name)}</div>
            ${renderRuleCountChips(row)}
            ${extraNotes ? `<div class="mini-note leader-extra-note">${extraNotes}</div>` : ''}
          </div>
          <div class="points">${row.total}</div>
          ${renderBreakbar(row)}
        </button>
      `;
    }

    function renderRuleCountChips(row) {
      const chips = SCORE_RULES.map(rule => {
        const count = Number(row.breakdown?.[rule.points] || 0);
        return `<span class="rule-count-chip tier-${rule.points}" title="${escapeAttr(rule.label)} · ${rule.points} pts"><strong>${count}</strong> ${escapeHtml(rule.short)}</span>`;
      }).join('');
      return `<div class="rule-summary" aria-label="Desglose de reglas de puntaje">${chips}</div>`;
    }

    function renderBreakbar(row) {
      const totalPoints = SCORE_TIERS.slice(0, -1).reduce((sum, tier) => sum + row.breakdown[tier] * tier, 0);
      if (!totalPoints) return '<div class="breakbar"><span class="tier-0" style="width:100%"></span></div>';
      return `<div class="breakbar" title="Desglose por puntaje">${SCORE_TIERS.slice(0, -1).map(tier => {
        const points = row.breakdown[tier] * tier;
        const width = points ? Math.max(2, points / totalPoints * 100) : 0;
        return `<span class="tier-${tier}" title="${row.breakdown[tier]} de ${tier} pts" style="width:${width}%"></span>`;
      }).join('')}</div>`;
    }

    function renderPrizeCard() {
      const pool = APP_STATE.prizePool || '';
      return `
        <article class="card pad prize-card">
          <div class="section-title">
            <div><h3>Premios</h3><p>1er Premio: 2/3 del pozo | 2do Premio: 1/3 del pozo</p></div>
          </div>
          <div class="money-row">
            <label>Monto del pozo
              <input id="prizePool" type="number" min="0" step="1000" inputmode="numeric" placeholder="Ej: 240000" value="${pool}">
            </label>
            <div class="money-box"><span>1er Premio</span><strong id="firstPrize">${formatMoney(APP_STATE.prizePool * 2 / 3)}</strong></div>
            <div class="money-box"><span>2do Premio</span><strong id="secondPrize">${formatMoney(APP_STATE.prizePool / 3)}</strong></div>
          </div>
        </article>`;
    }

    function renderPrizeNumbers() {
      $('#firstPrize').textContent = formatMoney(APP_STATE.prizePool * 2 / 3);
      $('#secondPrize').textContent = formatMoney(APP_STATE.prizePool / 3);
    }

    function renderHoy() {
      const todayKey = dateKeyArgentina(new Date());
      const todayMatches = PRODE_DATA.matches.map((match, index) => ({ match, index, entry: getResultEntry(index) }))
        .filter(item => item.entry?.date && dateKeyArgentina(new Date(item.entry.date)) === todayKey)
        .sort((a, b) => String(a.entry.date).localeCompare(String(b.entry.date)));
      const next = findNextDatedMatch(todayKey);
      app.innerHTML = `
        <section class="grid">
          <article class="card pad">
            <div class="section-title">
              <div><h2>Hoy</h2><p>Fixture confirmado para ${new Intl.DateTimeFormat('es-AR', { timeZone: ARG_TIME_ZONE, dateStyle: 'full' }).format(new Date())}. Horarios de Argentina.</p></div>
              <span class="pill">${todayMatches.length} partidos</span>
            </div>
            ${todayMatches.length ? `<div class="grid">${todayMatches.map(renderTodayMatch).join('')}</div>` : renderNoToday(next)}
          </article>
        </section>`;
      $$('.match-toggle', app).forEach(btn => btn.addEventListener('click', () => {
        const index = btn.dataset.matchIndex;
        if (APP_STATE.expandedMatches.has(index)) APP_STATE.expandedMatches.delete(index); else APP_STATE.expandedMatches.add(index);
        renderHoy();
      }));
    }

    function renderTodayMatch(item) {
      const { match, index, entry } = item;
      const actual = getResultScore(index);
      const expanded = APP_STATE.expandedMatches.has(String(index));
      const winners = actual ? PRODE_DATA.participants.filter(name => calculatePoints(match.predictions[name], actual) >= 5).length : 0;
      const liveClass = isLiveEntry(entry) ? ' live-match' : '';
      return `
        <article class="match-card${liveClass}">
          <button class="match-toggle" type="button" data-match-index="${index}" aria-expanded="${expanded}">
            <div class="match-head">
              <div><div class="team right">${prettyTeam(match.team1)}</div><div class="match-meta">${formatKickoff(entry?.date)}</div></div>
              <div class="score-pill">${actual ? actual.join('-') : 'vs'}</div>
              <div><div class="team">${prettyTeam(match.team2)}</div><div class="match-meta">${match.group}</div></div>
              ${statusBadge(entry)}
              <span class="count-badge">${actual ? winners + '/' + PRODE_DATA.participants.length + ' acertaron' : statusText(entry)}</span>
            </div>
          </button>
          ${expanded ? `<div class="match-expanded">${renderPredictionTable(index, true)}</div>` : ''}
        </article>`;
    }

    function renderNoToday(next) {
      const detail = next ? `El próximo partido confirmado es el ${formatDateTime(next.entry.date)}: ${prettyTeam(next.match.team1)} vs ${prettyTeam(next.match.team2)}.` : 'No quedan partidos confirmados por delante en la fase de grupos.';
      return `<div class="empty"><strong>No hay partidos hoy en el radar.</strong><p>${detail}</p></div>`;
    }

    function findNextDatedMatch(todayKey) {
      return PRODE_DATA.matches.map((match, index) => ({ match, index, entry: getResultEntry(index) }))
        .filter(item => item.entry?.date && dateKeyArgentina(new Date(item.entry.date)) > todayKey)
        .sort((a, b) => String(a.entry.date).localeCompare(String(b.entry.date)))[0] || null;
    }

    function renderPartidos() {
      const groups = groupMatches();
      app.innerHTML = `
        <section>
          <article class="card pad">
            <div class="section-title">
              <div><h2>Partidos</h2><p>Fase de grupos completa. Todos los horarios están en hora Argentina.</p></div>
            </div>
            <div class="filterbar">
              <button class="filter-btn ${APP_STATE.filters.status === 'all' ? 'active' : ''}" data-filter-status="all" type="button">Todos</button>
              <button class="filter-btn ${APP_STATE.filters.status === 'played' ? 'active' : ''}" data-filter-status="played" type="button">Jugados</button>
              <button class="filter-btn ${APP_STATE.filters.status === 'pending' ? 'active' : ''}" data-filter-status="pending" type="button">Pendientes</button>
              <select id="groupFilter" aria-label="Filtrar por grupo">
                <option value="all">Todos los grupos</option>
                ${Array.from(groups.keys()).map(g => `<option value="${g}" ${APP_STATE.filters.group === g ? 'selected' : ''}>${g}</option>`).join('')}
              </select>
            </div>
            <div id="groupsWrap">
              ${Array.from(groups.entries()).map(([group, items]) => renderGroupBlock(group, items)).join('')}
            </div>
          </article>
        </section>`;
      $$('.filter-btn', app).forEach(btn => btn.addEventListener('click', () => { APP_STATE.filters.status = btn.dataset.filterStatus; renderPartidos(); }));
      $('#groupFilter').addEventListener('change', event => { APP_STATE.filters.group = event.target.value; renderPartidos(); });
      $$('.group-header', app).forEach(btn => btn.addEventListener('click', () => {
        const group = btn.dataset.group;
        if (APP_STATE.expandedGroups.has(group)) APP_STATE.expandedGroups.delete(group); else APP_STATE.expandedGroups.add(group);
        renderPartidos();
      }));
      $$('.match-toggle', app).forEach(btn => btn.addEventListener('click', () => {
        const index = btn.dataset.matchIndex;
        if (APP_STATE.expandedMatches.has(index)) APP_STATE.expandedMatches.delete(index); else APP_STATE.expandedMatches.add(index);
        renderPartidos();
      }));
    }

    function groupMatches() {
      const grouped = new Map();
      PRODE_DATA.matches.forEach((match, index) => {
        if (APP_STATE.filters.group !== 'all' && APP_STATE.filters.group !== match.group) return;
        if (APP_STATE.filters.status === 'played' && !isPlayed(index)) return;
        if (APP_STATE.filters.status === 'pending' && isPlayed(index)) return;
        if (!grouped.has(match.group)) grouped.set(match.group, []);
        grouped.get(match.group).push({ match, index });
      });
      return grouped;
    }

    function renderGroupBlock(group, items) {
      if (!items.length) return '';
      const collapsed = !APP_STATE.expandedGroups.has(group);
      const teams = Array.from(new Set(PRODE_DATA.matches.filter(m => m.group === group).flatMap(m => [m.team1, m.team2]))).map(prettyTeam).join(' · ');
      return `
        <section class="group-block ${collapsed ? 'collapsed' : ''}">
          <button class="group-header" type="button" data-group="${group}"><div><strong>${group.toUpperCase()}</strong><br><span>${teams}</span></div><span class="chev">⌄</span></button>
          <div class="group-content">${items.map(item => renderPartidoRow(item.match, item.index)).join('')}</div>
        </section>`;
    }

    function renderPartidoRow(match, index) {
      const actual = getResultScore(index);
      const entry = getResultEntry(index);
      const expanded = APP_STATE.expandedMatches.has(String(index));
      const winners = actual ? PRODE_DATA.participants.filter(name => calculatePoints(match.predictions[name], actual) >= 5).length : 0;
      return `
        <article class="match-card${isLiveEntry(entry) ? ' live-match' : ''}">
          <button class="match-toggle" type="button" data-match-index="${index}">
            <div class="match-head">
              <div><div class="team right">${prettyTeam(match.team1)}</div><div class="match-meta">${entry?.date ? formatDateTime(entry.date) : 'Horario a confirmar'}</div></div>
              <div class="score-pill">${actual ? actual.join('-') : 'vs'}</div>
              <div><div class="team">${prettyTeam(match.team2)}</div><div class="match-meta">${statusText(entry)}</div></div>
              ${statusBadge(entry)}
              <span class="count-badge">${actual ? winners + '/' + PRODE_DATA.participants.length + ' acertaron' : 'Pendiente'}</span>
            </div>
          </button>
          ${expanded ? `<div class="match-expanded">${renderPredictionTable(index, true)}</div>` : ''}
        </article>`;
    }

    function renderPredictionTable(index, withActual) {
      const match = PRODE_DATA.matches[index];
      const actual = getResultScore(index);
      const rows = PRODE_DATA.participants.map(name => {
        const pred = match.predictions[name];
        const points = calculatePoints(pred, actual);
        return { name, pred, points };
      }).sort((a, b) => b.points - a.points || a.name.localeCompare(b.name, 'es'));
      const actualLabel = withActual ? 'Resultado' : 'Real';
      return `
        <div class="table-wrap">
          <table class="pred-table">
            <thead><tr><th>Jugador</th><th>Prode</th><th>${actualLabel}</th><th>Regla</th><th>Puntos</th></tr></thead>
            <tbody>
              ${rows.map(row => `<tr><td data-label="Jugador">${escapeHtml(row.name)}</td><td data-label="Prode">${formatPrediction(row.pred)}</td><td data-label="${actualLabel}">${formatScore(actual)}</td><td data-label="Regla">${ruleLabel(row.points, actual, row.pred)}</td><td data-label="Puntos"><span class="point-chip p${row.points}">${actual ? row.points : '—'}</span></td></tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    }

    function renderDatosCuriosos() {
      const dates = getAllMatchDates();
      const selectedDate = ensureCurioDate(dates);
      const dayMatches = getMatchesForDateKey(selectedDate);
      const played = dayMatches.filter(item => isPlayed(item.index));
      const highlights = buildCurioHighlights(dayMatches);
      const dailyRanking = computeDailyLeaderboard(dayMatches);
      app.innerHTML = `
        <section class="grid curiosidades">
          <article class="card pad">
            <div class="section-title curio-title">
              <div><h2>Datos curiosos</h2><p>Elegí un día y compartí perlitas del prode por WhatsApp.</p></div>
              <div class="curio-actions">
                <label class="compact-label">Día
                  <select id="curioDate" aria-label="Elegir día">
                    ${dates.map(dateKey => `<option value="${dateKey}" ${dateKey === selectedDate ? 'selected' : ''}>${formatDateKeyLong(dateKey)}</option>`).join('')}
                  </select>
                </label>
                <button class="btn ghost" id="copyCurios" type="button">Copiar resumen</button>
                <button class="btn" id="waCurios" type="button">Compartir WhatsApp</button>
              </div>
            </div>
            <div class="stat-grid curio-stats">
              <div class="stat"><strong>${dayMatches.length}</strong><span>Partidos del día</span></div>
              <div class="stat"><strong>${played.length}</strong><span>Con resultado</span></div>
              <div class="stat"><strong>${highlights.totalExactos}</strong><span>Exactos del día</span></div>
              <div class="stat"><strong>${highlights.biggestConsensus ? Math.round(highlights.biggestConsensus.pct) + '%' : '—'}</strong><span>Mayor consenso</span></div>
            </div>
            ${dayMatches.length ? `
              <div class="curio-highlight-grid">
                ${renderCurioHighlight('🔥 Favorito más claro', highlights.biggestConsensus ? `${outcomeLabel(highlights.biggestConsensus.match, highlights.biggestConsensus.outcome)} en ${prettyTeam(highlights.biggestConsensus.match.team1)} vs ${prettyTeam(highlights.biggestConsensus.match.team2)}` : 'Todavía no hay pronósticos suficientes', highlights.biggestConsensus ? `${highlights.biggestConsensus.count}/${highlights.biggestConsensus.total} jugadores (${Math.round(highlights.biggestConsensus.pct)}%) fueron por esa tendencia.` : '—')}
                ${renderCurioHighlight('🤯 Partido más dividido', highlights.mostDivided ? `${prettyTeam(highlights.mostDivided.match.team1)} vs ${prettyTeam(highlights.mostDivided.match.team2)}` : 'Sin datos', highlights.mostDivided ? `La opción más votada apenas junta ${highlights.mostDivided.count}/${highlights.mostDivided.total} (${Math.round(highlights.mostDivided.pct)}%).` : '—')}
                ${renderCurioHighlight('🎯 Marcador de moda', highlights.topScore ? `${highlights.topScore.score} en ${prettyTeam(highlights.topScore.match.team1)} vs ${prettyTeam(highlights.topScore.match.team2)}` : 'Sin datos', highlights.topScore ? `Lo eligieron ${highlights.topScore.count} jugadores.` : '—')}
              </div>
              <div class="curio-match-grid">
                ${dayMatches.map(renderCurioMatchCard).join('')}
              </div>
            ` : renderNoToday(findNextDatedMatch(dateKeyArgentina(new Date())))}
          </article>
          <article class="card pad">
            <div class="section-title"><div><h3>Ranking del día</h3><p>Solo computa partidos de esta fecha que ya tengan resultado.</p></div></div>
            ${played.length ? renderDailyRanking(dailyRanking) : '<div class="empty"><strong>Aún no hay puntos para este día.</strong><p>Cuando haya resultados, acá aparece la mini-tabla diaria para chicanear.</p></div>'}
          </article>
        </section>`;
      $('#curioDate')?.addEventListener('change', event => { APP_STATE.curioDate = event.target.value; renderDatosCuriosos(); });
      $('#copyCurios')?.addEventListener('click', () => copyCurioSummary(selectedDate));
      $('#waCurios')?.addEventListener('click', () => shareCurioSummary(selectedDate));
    }

    function getAllMatchDates() {
      return Array.from(new Set(PRODE_DATA.matches.map((match, index) => getResultEntry(index)?.date).filter(Boolean).map(date => dateKeyArgentina(new Date(date))))).sort();
    }

    function ensureCurioDate(dates = getAllMatchDates()) {
      if (!dates.length) return null;
      const today = dateKeyArgentina(new Date());
      if (APP_STATE.curioDate && dates.includes(APP_STATE.curioDate)) return APP_STATE.curioDate;
      APP_STATE.curioDate = dates.find(date => date >= today) || dates[dates.length - 1];
      return APP_STATE.curioDate;
    }

    function getMatchesForDateKey(dateKey) {
      if (!dateKey) return [];
      return PRODE_DATA.matches.map((match, index) => ({ match, index, entry: getResultEntry(index) }))
        .filter(item => item.entry?.date && dateKeyArgentina(new Date(item.entry.date)) === dateKey)
        .sort((a, b) => String(a.entry.date).localeCompare(String(b.entry.date)));
    }

    function buildCurioHighlights(items) {
      const candidates = [];
      let topScore = null;
      let totalExactos = 0;
      items.forEach(item => {
        const stats = predictionStats(item.match);
        const actual = getResultScore(item.index);
        if (actual) {
          totalExactos += PRODE_DATA.participants.filter(name => calculatePoints(item.match.predictions[name], actual) === 10).length;
        }
        const favorite = stats.outcomes[0];
        if (favorite && stats.valid) {
          candidates.push({ ...favorite, total: stats.valid, pct: favorite.count / stats.valid * 100, match: item.match, index: item.index });
        }
        const score = stats.scores[0];
        if (score && (!topScore || score.count > topScore.count)) {
          topScore = { ...score, match: item.match, index: item.index };
        }
      });
      const biggestConsensus = candidates.slice().sort((a, b) => b.pct - a.pct || b.count - a.count)[0] || null;
      const mostDivided = candidates.slice().sort((a, b) => a.pct - b.pct || a.count - b.count)[0] || null;
      return { biggestConsensus, mostDivided, topScore, totalExactos };
    }

    function predictionStats(match) {
      const outcomeMap = new Map([['home', 0], ['draw', 0], ['away', 0]]);
      const scoreMap = new Map();
      let valid = 0;
      let missing = 0;
      for (const pred of Object.values(match.predictions)) {
        if (!Array.isArray(pred)) { missing += 1; continue; }
        valid += 1;
        const outcome = scoreOutcome(pred);
        outcomeMap.set(outcome, (outcomeMap.get(outcome) || 0) + 1);
        const score = pred.join('-');
        scoreMap.set(score, (scoreMap.get(score) || 0) + 1);
      }
      const outcomes = Array.from(outcomeMap.entries()).map(([outcome, count]) => ({ outcome, count })).sort((a, b) => b.count - a.count);
      const scores = Array.from(scoreMap.entries()).map(([score, count]) => ({ score, count })).sort((a, b) => b.count - a.count || a.score.localeCompare(b.score)).slice(0, 3);
      return { valid, missing, outcomes, scores };
    }

    function scoreOutcome(score) {
      if (!Array.isArray(score)) return null;
      if (score[0] > score[1]) return 'home';
      if (score[0] < score[1]) return 'away';
      return 'draw';
    }

    function outcomeLabel(match, outcome) {
      if (outcome === 'home') return 'Gana ' + prettyTeam(match.team1);
      if (outcome === 'away') return 'Gana ' + prettyTeam(match.team2);
      if (outcome === 'draw') return 'Empate';
      return 'Sin dato';
    }

    function renderCurioHighlight(icon, title, detail) {
      return `<div class="curio-highlight"><span>${icon}</span><strong>${escapeHtml(title)}</strong><p>${escapeHtml(detail)}</p></div>`;
    }

    function renderCurioMatchCard(item) {
      const { match, index, entry } = item;
      const stats = predictionStats(match);
      const actual = getResultScore(index);
      const exactos = actual ? PRODE_DATA.participants.filter(name => calculatePoints(match.predictions[name], actual) === 10).length : 0;
      return `
        <article class="curio-match-card">
          <div class="curio-match-head">
            <div><strong>${prettyTeam(match.team1)} vs ${prettyTeam(match.team2)}</strong><span>${match.group} · ${formatKickoff(entry?.date)}</span></div>
            <div class="score-pill">${actual ? actual.join('-') : 'vs'}</div>
          </div>
          <div class="outcome-bars">
            ${stats.outcomes.map(row => renderOutcomeBar(match, row, stats.valid)).join('')}
          </div>
          <div class="score-cloud">
            ${stats.scores.map(row => `<span>${row.score} <strong>${row.count}</strong></span>`).join('') || '<span>Sin pronósticos</span>'}
          </div>
          <p class="mini-note">${actual ? `${exactos} exactos con el resultado real.` : `Marcadores más elegidos arriba. ${stats.missing ? stats.missing + ' sin cargar.' : 'Todos cargaron.'}`}</p>
        </article>`;
    }

    function renderOutcomeBar(match, row, total) {
      const pct = total ? row.count / total * 100 : 0;
      return `
        <div class="outcome-bar">
          <div class="outcome-bar-label"><span>${escapeHtml(outcomeLabel(match, row.outcome))}</span><strong>${row.count}</strong></div>
          <div class="bar-track"><span style="width:${pct}%"></span></div>
        </div>`;
    }

    function computeDailyLeaderboard(items) {
      const rows = PRODE_DATA.participants.map(name => {
        const breakdown = Object.fromEntries(SCORE_TIERS.map(t => [t, 0]));
        const points = items.map(item => calculatePoints(item.match.predictions[name], getResultScore(item.index)));
        points.forEach(point => { breakdown[point] = (breakdown[point] || 0) + 1; });
        return { name, total: points.reduce((sum, point) => sum + point, 0), breakdown, exactos: breakdown[10] || 0 };
      }).sort((a, b) => b.total - a.total || b.exactos - a.exactos || a.name.localeCompare(b.name, 'es'));
      return assignRanks(rows);
    }

    function renderDailyRanking(rows) {
      return `
        <div class="daily-ranking">
          ${rows.slice(0, 10).map(row => `
            <div class="daily-row">
              <span class="rank ${row.rank <= 3 ? 'r' + row.rank : ''}">${row.rank <= 3 ? ['🥇','🥈','🥉'][row.rank - 1] : row.rank}</span>
              <span class="player-name">${escapeHtml(row.name)}</span>
              <span>${row.exactos} exactos</span>
              <strong>${row.total} pts</strong>
            </div>`).join('')}
        </div>`;
    }

    function buildCurioShareText(dateKey) {
      const items = getMatchesForDateKey(dateKey);
      const highlights = buildCurioHighlights(items);
      const ranking = computeDailyLeaderboard(items).filter(row => row.total > 0).slice(0, 5);
      const lines = [
        `✨ Datos de color del prode · ${formatDateKeyLong(dateKey)}`,
        `Partidos: ${items.length}`
      ];
      if (highlights.biggestConsensus) lines.push(`🔥 Favorito más claro: ${outcomeLabel(highlights.biggestConsensus.match, highlights.biggestConsensus.outcome)} (${highlights.biggestConsensus.count}/${highlights.biggestConsensus.total})`);
      if (highlights.mostDivided) lines.push(`🤯 Más dividido: ${prettyTeam(highlights.mostDivided.match.team1)} vs ${prettyTeam(highlights.mostDivided.match.team2)} (${Math.round(highlights.mostDivided.pct)}% la opción más votada)`);
      if (highlights.topScore) lines.push(`🎯 Marcador de moda: ${highlights.topScore.score} en ${prettyTeam(highlights.topScore.match.team1)} vs ${prettyTeam(highlights.topScore.match.team2)} (${highlights.topScore.count} votos)`);
      if (ranking.length) {
        lines.push('', '🏆 Top del día:');
        ranking.forEach(row => lines.push(`${row.rank}. ${row.name}: ${row.total} pts`));
      }
      lines.push('', '📱 Más detalles en la app del Prode Mundial 2026');
      return lines.join('\n');
    }

    async function copyCurioSummary(dateKey) {
      const text = buildCurioShareText(dateKey);
      try {
        await navigator.clipboard.writeText(text);
        showToast('Resumen copiado para pegar en WhatsApp');
      } catch (error) {
        const area = document.createElement('textarea');
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand('copy');
        area.remove();
        showToast('Resumen copiado');
      }
    }

    function shareCurioSummary(dateKey) {
      const text = buildCurioShareText(dateKey);
      window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank', 'noopener,noreferrer');
    }

    function formatDateKeyLong(dateKey) {
      if (!dateKey) return 'Sin fecha';
      const y = dateKey.slice(0, 4);
      const m = dateKey.slice(4, 6);
      const d = dateKey.slice(6, 8);
      return new Intl.DateTimeFormat('es-AR', { timeZone: ARG_TIME_ZONE, weekday: 'short', day: '2-digit', month: 'short' }).format(new Date(`${y}-${m}-${d}T12:00:00-03:00`)).replace('.', '');
    }

    function renderSimulador() {
      const remaining = PRODE_DATA.matches.map((match, index) => ({ match, index })).filter(item => !isPlayed(item.index));
      const current = computeLeaderboard(APP_STATE.results);
      const simulated = computeLeaderboard(APP_STATE.simulatedOverrides, { useSimulationDefaults: true });
      const currentByName = Object.fromEntries(current.map(r => [r.name, r]));
      app.innerHTML = `
        <section class="sim-layout">
          <article class="card pad">
            <div class="section-title">
              <div><h2>Simulador</h2><p>Los pendientes arrancan vacíos y no suman en el ranking proyectado hasta que cargues los dos goles.</p></div>
              <div class="header-actions"><button class="btn ghost" id="clearSim" type="button">Limpiar simulación</button><button class="btn" id="realSim" type="button">Aplicar resultados reales</button></div>
            </div>
            ${remaining.length ? `<div class="sim-grid">${remaining.map(item => renderSimCard(item.match, item.index)).join('')}</div>` : '<div class="empty"><strong>Todos los partidos de grupos tienen resultado.</strong><p>No quedan escenarios para simular en esta fase.</p></div>'}
          </article>
          <aside class="card pad sticky-side">
            <div class="section-title"><div><h3>Ranking proyectado</h3><p>Actual vs simulado</p></div></div>
            <div class="sim-rank-row header"><span>Rank</span><span>Jugador</span><span>Actual</span><span>Sim</span><span>Δ</span></div>
            ${simulated.map(row => renderSimRankRow(row, currentByName[row.name])).join('')}
          </aside>
        </section>`;
      $$('.sim-score', app).forEach(input => input.addEventListener('input', handleSimInput));
      $('#clearSim')?.addEventListener('click', () => { APP_STATE.simulatedOverrides = {}; showToast('Simulación reseteada'); renderSimulador(); });
      $('#realSim')?.addEventListener('click', () => { APP_STATE.simulatedOverrides = {}; showToast('Solo quedan resultados reales: los pendientes no computan'); renderSimulador(); });
    }

    function renderSimCard(match, index) {
      const score = getSimInputValues(index);
      const complete = Array.isArray(getSimulatedScore(index, APP_STATE.simulatedOverrides));
      return `
        <div class="sim-card ${complete ? 'complete' : 'pending'}">
          <div class="match-meta">${match.group} · ${complete ? 'simulado y computado' : 'pendiente: no computa'}</div>
          <div class="sim-teams"><div class="team right">${prettyTeam(match.team1)}</div><span class="score-pill">vs</span><div class="team">${prettyTeam(match.team2)}</div></div>
          <div class="sim-inputs">
            <label>${prettyTeam(match.team1)}<input class="sim-score" data-index="${index}" data-side="0" type="number" min="0" max="20" inputmode="numeric" placeholder="—" value="${score[0]}"></label>
            <label>${prettyTeam(match.team2)}<input class="sim-score" data-index="${index}" data-side="1" type="number" min="0" max="20" inputmode="numeric" placeholder="—" value="${score[1]}"></label>
          </div>
        </div>`;
    }

    function handleSimInput(event) {
      const index = event.target.dataset.index;
      const side = Number(event.target.dataset.side);
      const current = getSimInputValues(Number(index));
      current[side] = event.target.value === '' ? '' : clampScore(event.target.value);
      if (current[0] === '' && current[1] === '') {
        delete APP_STATE.simulatedOverrides[index];
      } else {
        APP_STATE.simulatedOverrides[index] = { score: current, simulated: true };
      }
      renderSimulador();
    }

    function clampScore(value) {
      const n = Number(value);
      if (!Number.isFinite(n) || n < 0) return 0;
      return Math.min(20, Math.floor(n));
    }

    function renderSimRankRow(row, current) {
      const currentRank = current?.rank || '-';
      const rankDelta = current ? current.rank - row.rank : 0;
      const pointsDelta = current ? row.total - current.total : 0;
      let deltaClass = 'same';
      let deltaText = '=';
      if (rankDelta > 0) { deltaClass = 'up'; deltaText = '↑' + rankDelta; }
      if (rankDelta < 0) { deltaClass = 'down'; deltaText = '↓' + Math.abs(rankDelta); }
      return `<div class="sim-rank-row"><span>${currentRank}→${row.rank}</span><span class="player-name">${escapeHtml(row.name)}</span><span>${current?.total ?? 0}</span><span>${row.total}</span><span class="delta ${deltaClass}" title="${pointsDelta >= 0 ? '+' : ''}${pointsDelta} pts">${deltaText}</span></div>`;
    }

    function openParticipantDrawer(name) {
      APP_STATE.selectedParticipant = name;
      const leaderboard = computeLeaderboard(APP_STATE.results);
      const row = leaderboard.find(item => item.name === name);
      const byGroup = new Map();
      PRODE_DATA.matches.forEach((match, index) => {
        if (!byGroup.has(match.group)) byGroup.set(match.group, []);
        byGroup.get(match.group).push({ match, index, points: row.matchPoints[index] });
      });
      const drawer = $('#drawer');
      drawer.innerHTML = `
        <div class="drawer-head">
          <div><h2>${escapeHtml(name)}</h2><p class="mini-note">${row.rank}° puesto · ${row.total} puntos · ${row.breakdown[10]} exactos${countMissingPredictions(name) ? ' · ' + countMissingPredictions(name) + ' sin cargar' : ''}</p></div>
          <button class="btn ghost" id="closeDrawer" type="button">Cerrar</button>
        </div>
        <div class="drawer-body">
          ${Array.from(byGroup.entries()).map(([group, items]) => `
            <section class="detail-group"><h3>${group}</h3>
              ${items.map(item => renderParticipantMatch(name, item.match, item.index, item.points)).join('')}
            </section>`).join('')}
          <div class="drawer-total"><div class="money-box"><span>Total</span><strong>${row.total} puntos</strong></div></div>
        </div>`;
      $('#closeDrawer').addEventListener('click', closeDrawer);
      $('#drawerOverlay').classList.add('show');
      drawer.classList.add('show');
      drawer.setAttribute('aria-hidden', 'false');
    }

    function renderParticipantMatch(name, match, index, points) {
      const pred = match.predictions[name];
      const actual = getResultScore(index);
      return `
        <div class="detail-row">
          <div><strong>${prettyTeam(match.team1)} vs ${prettyTeam(match.team2)}</strong><small>${statusText(getResultEntry(index))}</small></div>
          <span>${formatPrediction(pred)}</span>
          <span>${formatScore(actual)}</span>
          <span class="point-chip p${points}">${actual ? points : '—'}</span>
        </div>`;
    }

    function closeDrawer() {
      $('#drawerOverlay').classList.remove('show');
      const drawer = $('#drawer');
      drawer.classList.remove('show');
      drawer.setAttribute('aria-hidden', 'true');
    }

    function isLiveEntry(entry) {
      if (!entry) return false;
      if (entry.state === 'in') return true;
      const text = [entry.state, entry.description, entry.displayClock].filter(Boolean).join(' ').toUpperCase();
      return /(IN_PROGRESS|STATUS_IN_PROGRESS|LIVE|EN VIVO|HALFTIME|HALF\s*TIME|1ST|2ND|FIRST HALF|SECOND HALF|EXTRA TIME|PENALTY|INTERMISSION)/.test(text);
    }

    function isFinalEntry(entry) {
      if (!entry) return false;
      if (entry.completed || entry.state === 'post') return true;
      const text = [entry.state, entry.description].filter(Boolean).join(' ').toUpperCase();
      return /\b(FINAL|FT|FULL\s*TIME|COMPLETED|STATUS_FINAL)\b/.test(text);
    }

    function statusBadge(entry) {
      if (isLiveEntry(entry)) {
        const clock = entry?.displayClock ? ' · ' + escapeHtml(entry.displayClock) : '';
        return `<span class="status live" title="Partido en vivo">EN VIVO${clock}</span>`;
      }
      if (isFinalEntry(entry)) return '<span class="status final">FINAL</span>';
      return '<span class="status pre">PRE-PARTIDO</span>';
    }

    function statusText(entry) {
      if (!entry) return 'Sin datos';
      if (isLiveEntry(entry)) return entry.displayClock ? 'En vivo · ' + entry.displayClock : 'En vivo';
      if (isFinalEntry(entry)) return 'Final';
      return entry.venue ? 'Pre-partido · ' + entry.venue : 'Pre-partido';
    }

    function ruleLabel(points, actual, pred) {
      if (!actual) return 'Pendiente';
      if (!Array.isArray(pred)) return 'Sin prode';
      return SCORE_RULES.find(rule => rule.points === points)?.label || 'Nada';
    }

    function prettyTeam(name) {
      const aliases = {
        'Sudafrica': 'Sudáfrica', 'Republica Checa': 'Rep. Checa', 'Corea del Sur': 'Corea del Sur',
        'Estados Unidos': 'Estados Unidos', 'Turquia': 'Turquía', 'Alemania': 'Alemania',
        'Costa de Marfil': 'Costa de Marfil', 'Curazao': 'Curazao', 'Holanda': 'Países Bajos',
        'Japon': 'Japón', 'Suecia': 'Suecia', 'Tunez': 'Túnez', 'Belgica': 'Bélgica',
        'Egipto': 'Egipto', 'Nueva Zelanda': 'Nueva Zelanda', 'España': 'España',
        'Arabia Saudita': 'Arabia Saudita', 'Cabo Verde': 'Cabo Verde', 'Francia': 'Francia',
        'Irak': 'Irak', 'Noruega': 'Noruega', 'Argelia': 'Argelia', 'Jordania': 'Jordania',
        'Uzbekistan': 'Uzbekistán', 'Inglaterra': 'Inglaterra', 'Croacia': 'Croacia',
        'Marruecos': 'Marruecos', 'Brasil': 'Brasil', 'Haiti': 'Haití', 'Escocia': 'Escocia',
        'Canada': 'Canadá', 'Suiza': 'Suiza', 'Iran': 'Irán', 'Panama': 'Panamá'
      };
      return aliases[name] || name;
    }

    function formatScore(score) { return Array.isArray(score) ? score.join('-') : '—'; }
    function formatPrediction(score) { return Array.isArray(score) ? score.join('-') : '<span class="missing-prode">Sin prode</span>'; }
    function countMissingPredictions(name) { return PRODE_DATA.matches.reduce((sum, match) => sum + (Array.isArray(match.predictions[name]) ? 0 : 1), 0); }
    function dateKeyArgentina(date) {
      return new Intl.DateTimeFormat('en-CA', { timeZone: ARG_TIME_ZONE, year: 'numeric', month: '2-digit', day: '2-digit' }).format(date).replaceAll('-', '');
    }
    function formatKickoff(date) {
      return date ? new Intl.DateTimeFormat('es-AR', { timeZone: ARG_TIME_ZONE, hour: '2-digit', minute: '2-digit', hour12: false }).format(new Date(date)) + ' hs' : 'Horario a confirmar';
    }
    function formatDateTime(date) {
      if (!date) return 'A confirmar';
      const d = new Date(date);
      const day = new Intl.DateTimeFormat('es-AR', { timeZone: ARG_TIME_ZONE, day: '2-digit', month: 'short' }).format(d).replace('.', '');
      const time = new Intl.DateTimeFormat('es-AR', { timeZone: ARG_TIME_ZONE, hour: '2-digit', minute: '2-digit', hour12: false }).format(d);
      return `${day}, ${time} hs`;
    }
    function formatMoney(value) {
      const n = Number(value || 0);
      return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(n);
    }

    function showToast(message) {
      const node = document.createElement('div');
      node.className = 'toast';
      node.textContent = message;
      $('#toasts').appendChild(node);
      setTimeout(() => node.remove(), 4200);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#039;', '"': '&quot;' }[char]));
    }
    function escapeAttr(value) { return escapeHtml(value); }
  </script>
</body>
</html>
